services:
  nginx:
    image: nginx:1.25-alpine
    container_name: disability_portal_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend
    depends_on:
      - php
      - frontend

  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: disability_portal_php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    image: node:20-alpine
    container_name: disability_portal_frontend
    working_dir: /var/www/frontend
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}; else echo 'frontend not initialized yet' && tail -f /dev/null; fi"
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    volumes:
      - ./frontend:/var/www/frontend

  postgres:
    image: postgres:15-alpine
    container_name: disability_portal_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: disability_portal_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: disability_portal_minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9002}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9001}:9001"
      - "${MINIO_CONSOLE_PORT:-9002}:${MINIO_CONSOLE_PORT:-9002}"
    volumes:
      - ./docker/minio:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: disability_portal_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
