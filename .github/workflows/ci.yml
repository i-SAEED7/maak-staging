name: CI Blueprint

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install backend dependencies
        run: |
          cd backend
          composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: |
          cd backend
          php artisan pint --test

      - name: Run PHPStan
        run: |
          cd backend
          vendor/bin/phpstan analyse

      - name: Run Pest
        run: |
          cd backend
          php artisan test

  frontend-lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run Vitest
        run: |
          cd frontend
          npm run test

  build-artifacts:
    runs-on: ubuntu-latest
    needs:
      - backend-lint-and-test
      - frontend-lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build
